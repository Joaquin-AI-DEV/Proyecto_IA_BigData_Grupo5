<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockPulse</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
 
  <!-- Navbar inyectada dinámicamente -->
  <div id="navbar-placeholder"></div>
 
  <!-- HERO -->
  <section class="hero">
    <h2 class="hero-title">StockPulse</h2>
    <span class="hero-badge">Sistema de predicción de demanda</span>
    <h1>Anticipa tu <span>stock</span>,<br>optimiza tu negocio</h1>
    <p>Carga tus datos de ventas y obtén predicciones precisas de demanda con modelos de machine learning.</p>
 
    <div class="hero-actions">
      <button class="btn btn-primary btn-lg" onclick="handleUploadClick()">
        Cargar CSV / XLSX
      </button>
      <button class="btn btn-outline btn-lg" onclick="window.location.href='/frontend/ourproject.html'">
        Saber más
      </button>
    </div>
 
    <!-- Upload area (visible solo con sesión) -->
    <div class="upload-area" id="uploadArea" style="display:none;" onclick="triggerFileInput()">
      <input type="file" id="fileInput" accept=".csv,.xlsx" onchange="handleFileChange(event)" onclick="event.stopPropagation()" />
      <span class="upload-icon">&#128196;</span>
      <p><span class="upload-label">Selecciona un archivo</span> o arrastralo aquí</p>
      <p style="margin-top:0.4rem; font-size:0.78rem;">Solo .csv y .xlsx</p>
    </div>
 
    <div class="alert alert-error"   id="uploadError"></div>
    <div class="alert alert-success" id="uploadSuccess"></div>
  </section>
 
  <script src="/static/js/session.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    fetch('/frontend/navbar.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
        // Marcar enlace activo
        const link = document.querySelector('[data-page="inicio"]');
        if (link) link.classList.add('active');
        updateNavbar();
      });
  </script>
</body>
</html>
