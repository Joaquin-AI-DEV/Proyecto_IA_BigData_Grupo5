<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockPulse — Contacto</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
 
  <div id="navbar-placeholder"></div>
 
  <div class="static-page">
    <h1>Contacto</h1>
    <p class="lead">¿Tienes alguna pregunta sobre StockPulse? Escríbenos.</p>
    <div class="contact-form">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Mensaje</label>
        <input type="text" placeholder="Tu mensaje..." />
      </div>
      <button class="btn btn-primary" style="margin-top:0.5rem;">Enviar mensaje</button>
    </div>
  </div>
 
  <script src="/static/js/session.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    fetch('/frontend/navbar.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
        const link = document.querySelector('[data-page="contacto"]');
        if (link) link.classList.add('active');
        updateNavbar();
      });
  </script>
</body>
</html>
