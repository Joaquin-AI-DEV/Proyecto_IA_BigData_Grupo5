<!-- sidebar.html — Barra lateral del dashboard de StockPulse -->
<!-- Se incluye únicamente en dashboard.html -->
 
<!-- Input de archivo oculto — activado por el botón del sidebar -->
<input
  type="file"
  id="fileInput"
  accept=".csv,.xlsx"
  style="display:none;"
  onchange="handleFileChange(event)"
/>
 
<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-title">Navegación</div>
    <a class="sidebar-item active" onclick="showDashboardTab('overview')">
      <span class="sidebar-icon">&#9632;</span> Resumen
    </a>
    <a class="sidebar-item" onclick="showDashboardTab('ventas')">
      <span class="sidebar-icon">&#9650;</span> Ventas
    </a>
    <a class="sidebar-item" onclick="showDashboardTab('predicciones')">
      <span class="sidebar-icon">&#9670;</span> Predicciones
    </a>
  </div>
 
  <div class="sidebar-section">
    <div class="sidebar-title">Datos</div>
    <a class="sidebar-item" id="sidebarUploadBtn" onclick="triggerFileInput()">
      <span class="sidebar-icon">&#8593;</span> Cargar nuevo CSV
    </a>
 
    <!-- Estado del upload: oculto por defecto -->
    <div id="uploadStatus" style="display:none; padding: 0.5rem 0.75rem; margin-top:0.25rem; font-size:0.78rem; border-radius: 6px;">
      <div id="uploadStatusText" style="color: var(--text-muted);"></div>
    </div>
  </div>
</aside>
